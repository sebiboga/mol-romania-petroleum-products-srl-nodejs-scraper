name: WebScraper MOL to Peviitor

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Install Chrome for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
      - name: Run scraper
        run: npm run scrape
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Check for new jobs
        run: |
          if [ -f jobs.json ]; then
            echo "New jobs found:"
            cat jobs.json | jq '.jobs | length'
          else
            echo "No new jobs or scrape failed"
          fi
          
      - name: Upload jobs JSON
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: scraped-jobs
          path: |
            jobs.json
            jobs_existing.json
          retention-days: 7