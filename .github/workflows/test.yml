name: Automation Tests

on:
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no deletions)'
        required: true
        default: 'true'

jobs:
  validate-jobs:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install
        
      - name: Validate and remove expired jobs
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Schedule trigger — running LIVE mode..."
            node --no-deprecation tests/validate-mol-jobs.js --delete
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Running in DRY RUN mode..."
            node --no-deprecation tests/validate-mol-jobs.js --dry-run
          else
            echo "Running in LIVE mode (will delete expired jobs)..."
            node --no-deprecation tests/validate-mol-jobs.js --delete
          fi
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}

  ensure-company-core:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ensure MOL exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:7745470&rows=1" | jq '.response.numFound')
          
          echo "MOL count in company core: $EXISTING"
          
          if [ "$EXISTING" -eq "0" ]; then
            echo "MOL not found - adding to company core..."
            echo '[{"id":"7745470","company":"MOL ROMANIA PETROLEUM PRODUCTS SRL","brand":"MOL","status":"activ","location":["Cluj-Napoca"],"website":["https://www.molromania.ro"],"career":["https://molgroup.taleo.net/careersection/external/jobsearch.ftl?lang=en"],"lastScraped":"2026-06-01","scraperFile":"https://raw.githubusercontent.com/sebiboga/mol-romania-petroleum-products-srl-nodejs-scraper/master/.github/workflows/scrape.yml"}]' > company_data.json
            
            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              --data-binary @company_data.json
          else
            echo "MOL already exists in company core - no action needed"
          fi
          
          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:7745470&rows=1" | jq '.response.numFound')
          
          echo "MOL count after check: $FINAL"
          
          if [ "$FINAL" -ge "1" ]; then
            echo "✅ SUCCESS: MOL is in company core"
          else
            echo "❌ FAILED: MOL still not in company core"
            exit 1
          fi

  Automation-Tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v5
        
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: |
          npm run test:unit
          mv test-report.html test-results-unit.html 2>/dev/null || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-results-unit.html
          retention-days: 30

      - name: Run Integration Tests
        run: |
          npm run test:integration
          mv test-report.html test-results-integration.html 2>/dev/null || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Integration Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-results-integration.html
          retention-days: 30

      - name: Run E2E Tests
        run: |
          npm run test:e2e
          mv test-report.html test-results-e2e.html 2>/dev/null || true
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results-e2e.html
          retention-days: 30