name: Automation Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run all tests
        run: npm test
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test-report.html
          retention-days: 7